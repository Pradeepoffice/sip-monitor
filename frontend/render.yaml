# render.yaml — Deploy both backend and frontend to Render
# Commit this file to the root of your GitHub repo

services:
  # ── Backend (Node.js API) ──────────────────────────────────────────────────
  - type: web
    name: sip-monitor-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: CHECK_INTERVAL
        value: 30
      # ⚠ Fill these in Render Dashboard → Environment tab (never commit secrets)
      - key: SIP_ENDPOINTS
        sync: false   # set manually in Render dashboard
      - key: ALERT_EMAIL_ENABLED
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_SLACK_ENABLED
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_ENABLED
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
    healthCheckPath: /api/health

  # ── Frontend (React Static Site) ──────────────────────────────────────────
  - type: web
    name: sip-monitor-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        # ⚠ Replace with your actual backend Render URL after deploying backend
        value: https://sip-monitor-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
